<div class="page-container">
  <mat-card class="table-card">
    <div class="header">
      <h2>Lista de usuarios</h2>
      <button mat-raised-button color="primary" routerLink="/usuarios/nuevo">
        Nuevo usuario
      </button>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="usuarios" class="mat-elevation-z2 full-width-table">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let usuario">{{ usuario.id }}</td>
        </ng-container>

        <ng-container matColumnDef="nombreUsuario">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let usuario">{{ usuario.nombreUsuario }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Correo</th>
          <td mat-cell *matCellDef="let usuario">{{ usuario.email }}</td>
        </ng-container>

        <ng-container matColumnDef="rol">
          <th mat-header-cell *matHeaderCellDef>Rol</th>
          <td mat-cell *matCellDef="let usuario">{{ usuario.rol }}</td>
        </ng-container>

        <ng-container matColumnDef="fechaRegistro">
          <th mat-header-cell *matHeaderCellDef>Fecha de registro</th>
          <td mat-cell *matCellDef="let usuario">{{ usuario.fechaRegistro }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
    </div>
  </mat-card>
</div>
